# Storage config for podman running *inside* this container (nested podman).
# Overlay-on-overlay under nested user namespaces is rejected by the kernel, so the
# inner podman must drive overlay through fuse-overlayfs. Pair this with the
# `make shell NESTED_PODMAN=1` run flags (--device /dev/fuse, etc.) and a non-overlay
# backing store for /var/lib/containers (the --tmpfs the Makefile adds).
[storage]
driver = "overlay"

[storage.options.overlay]
mount_program = "/usr/bin/fuse-overlayfs"
